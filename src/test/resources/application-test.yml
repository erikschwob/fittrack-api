spring:
  datasource:
    # H2 in PostgreSQL-compatibility mode so the same Flyway migrations run.
    url: jdbc:h2:mem:fittrack;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
