spring:
  application:
    name: fittrack-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fittrack}
    username: ${SPRING_DATASOURCE_USERNAME:fittrack}
    password: ${SPRING_DATASOURCE_PASSWORD:fittrack}
  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true         # liveness/readiness for Kubernetes
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
