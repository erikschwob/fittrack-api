apiVersion: v1
kind: Secret
metadata:
  name: fittrack-db
  namespace: fittrack
type: Opaque
stringData:
  POSTGRES_DB: fittrack
  POSTGRES_USER: fittrack
  # Demo credential only. In a real cluster this would come from a sealed secret
  # or an external secret store (e.g. Vault / External Secrets Operator).
  POSTGRES_PASSWORD: fittrack
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fittrack-pgdata
  namespace: fittrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fittrack
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: fittrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: fittrack
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: fittrack-db
          # PGDATA in a subdir so the volume root (with lost+found) isn't used.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fittrack"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: fittrack-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fittrack
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
